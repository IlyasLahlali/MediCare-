<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Résultats — Médicaments</title>
    <link rel="stylesheet" href="../../shared/css/base.css" />
<link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="inner">
        <a href="index.html" class="logo">MediCare+</a>
        <div class="header-actions">
          <a href="index.html" class="btn btn-outline">Accueil</a>
          <a href="recherchePharmacie.html" class="btn btn-outline">Pharmacies</a>
          <a href="carte.html" class="btn btn-outline">Carte</a>
        </div>
      </div>
    </header>

    <main class="container med-search-page">
      <header class="med-search-page__head">
        <h1>Trouver un médicament</h1>
        <p class="muted" id="search-summary">Pharmacies qui ont ce médicament en stock.</p>
      </header>

      <form id="search-med-form" class="med-search-bar">
        <input
          type="search"
          id="med-q"
          name="med-q"
          placeholder="Ex. Doliprane, Paracétamol…"
          minlength="2"
          autocomplete="off"
        />
        <button type="submit" class="btn btn-teal">Rechercher</button>
      </form>

      <div id="results" class="med-results-wrap"></div>
    </main>
<script src="../../shared/js/api.js"></script>
    <script src="../../shared/js/weeklyPharmacyHours.js?v=2"></script>
    <script src="../../shared/js/common.js"></script>
    <script src="../js/rechercheMedicament.js"></script>
  </body>
</html>
