<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Résultats — Pharmacies</title>
    <link rel="stylesheet" href="../../shared/css/base.css" />
    <link rel="stylesheet" href="../../shared/css/notifications.css" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <header class="site-header"></header>

    <main class="container">
      <h1>Résultats de recherche</h1>
      <p class="muted" id="search-summary"></p>

      <form id="search-pharmacy-form" class="hero-search-form card" style="padding: 1.25rem">
        <div class="hero-search-grid">
          <label class="hero-field">
            <span class="hero-field__label">Ville</span>
            <select id="search-ville" name="ville" aria-label="Ville">
              <option value="">Chargement…</option>
            </select>
          </label>
          <label class="hero-field">
            <span class="hero-field__label">Quartier</span>
            <select id="search-quartier" name="quartier" aria-label="Quartier">
              <option value="">Tous les quartiers</option>
            </select>
          </label>
        </div>
        <label class="hero-field hero-field--full">
          <span class="hero-field__label">Nom de la pharmacie <span class="hero-optional">(optionnel)</span></span>
          <input
            type="search"
            id="search-nom"
            name="nom"
            placeholder="Ex. Pharmacie Centrale"
            autocomplete="off"
          />
        </label>
        <p id="ville-auto-label" class="hero-hint muted">Détection de votre ville…</p>
        <div class="hero-filters" role="group" aria-label="Filtres">
          <label class="hero-check">
            <input type="checkbox" id="filter-ouvertes" name="ouvertes" checked />
            Ouvertes maintenant
          </label>
          <p class="hero-hint muted hero-hint--small hero-filters-hint">Inclut les pharmacies de garde.</p>
        </div>
        <div class="hero-search-actions">
          <button type="submit" class="btn btn-hero-primary">
            <span aria-hidden="true">🔍</span> Rechercher
          </button>
        </div>
      </form>

      <div id="results" class="pharmacy-list">
        <p class="muted">Chargement…</p>
      </div>
    </main>

    <script src="../../shared/js/api.js"></script>
    <script src="../../shared/js/common.js"></script>
    <script src="../../shared/js/userAuth.js"></script>
    <script src="../js/searchPharmacyForm.js"></script>
    <script src="../js/recherchePharmacie.js"></script>
  </body>
</html>
