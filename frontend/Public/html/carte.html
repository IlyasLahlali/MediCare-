<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carte des pharmacies — MediCare+</title>
    <link rel="stylesheet" href="../../shared/css/base.css" />
<link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../../shared/css/map.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
  </head>
  <body>
    <header class="site-header">
      <div class="inner">
        <a href="index.html" class="logo">MediCare+</a>
        <div class="header-actions">
          <a href="index.html" class="btn btn-outline">Accueil</a>
          <a href="recherchePharmacie.html" class="btn btn-outline">Rechercher</a>
          <a href="../../Utilisateur/html/login.html" class="btn btn-outline">Connexion</a>
        </div>
      </div>
    </header>

    <div class="map-page container" style="max-width: none; padding-bottom: 0">
      <div class="map-toolbar">
        <h1>Carte des pharmacies</h1>
        <div class="map-filters" role="group" aria-label="Filtres carte">
          <button type="button" class="map-filter-btn is-active" data-filter="all">Toutes</button>
          <button type="button" class="map-filter-btn" data-filter="ouvertes">Ouvertes</button>
          <button type="button" class="map-filter-btn" data-filter="garde">De garde</button>
        </div>
        <div class="map-actions">
          <button type="button" id="btn-locate" class="btn btn-teal btn-small">Ma position</button>
        </div>
      </div>

      <div class="map-wrap">
        <div id="map-status" class="map-status">Chargement de la carte…</div>
        <div id="pharmacy-map" aria-label="Carte interactive des pharmacies"></div>
        <div class="map-legend" aria-hidden="true">
          <div class="map-legend-item">
            <span class="map-legend-dot" style="background: #14b8a6"></span> Ouverte
          </div>
          <div class="map-legend-item">
            <span class="map-legend-dot" style="background: #f59e0b"></span> De garde
          </div>
          <div class="map-legend-item">
            <span class="map-legend-dot" style="background: #64748b"></span> Fermée
          </div>
          <div class="map-legend-item">
            <span class="map-legend-dot" style="background: #3b82f6"></span> Vous
          </div>
        </div>
      </div>
    </div>
<script src="../../shared/js/api.js"></script>
    <script src="../../shared/js/common.js"></script>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="../../shared/js/pharmacyMap.js"></script>
    <script src="../js/carte.js"></script>
  </body>
</html>
