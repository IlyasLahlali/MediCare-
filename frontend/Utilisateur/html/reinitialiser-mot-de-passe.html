<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nouveau mot de passe — MediCare+</title>
    <link rel="stylesheet" href="../../shared/css/base.css" />
    <link rel="stylesheet" href="../../shared/css/layout.css" />
    <link rel="stylesheet" href="../../shared/css/auth.css" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body class="auth-page auth-page--user">
    <div id="app-header"></div>

    <main class="auth-shell">
      <aside class="auth-brand" id="auth-brand-mount"></aside>

      <div class="auth-panel-wrap">
        <section class="auth-panel">
          <div class="auth-panel-head">
            <h1>Nouveau mot de passe</h1>
            <p class="muted">Choisissez un mot de passe d'au moins 6 caractères.</p>
          </div>

          <form id="reset-form" class="auth-form">
            <label>
              Nouveau mot de passe
              <input
                type="password"
                id="password"
                required
                minlength="6"
                autocomplete="new-password"
                placeholder="••••••••"
              />
            </label>
            <label>
              Confirmer le mot de passe
              <input
                type="password"
                id="password-confirm"
                required
                minlength="6"
                autocomplete="new-password"
                placeholder="••••••••"
              />
            </label>
            <p id="reset-msg" class="error" hidden></p>
            <button type="submit" class="auth-submit">Enregistrer</button>
          </form>

          <div class="auth-panel-foot">
            <a href="login.html" class="auth-link-btn">Aller à la connexion</a>
          </div>
        </section>
      </div>
    </main>

    <script src="../../shared/js/api.js"></script>
    <script src="../../shared/js/common.js"></script>
    <script src="../js/reinitialiserMotDePasse.js"></script>
  </body>
</html>
