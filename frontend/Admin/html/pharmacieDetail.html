<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Détail pharmacie — Admin MediCare+</title>
    <link rel="stylesheet" href="../../shared/css/base.css" />
    <link rel="stylesheet" href="../../shared/css/notifications.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="../css/style.css?v=6" />
  </head>
  <body class="admin-page admin-detail-page">
    <main class="admin-main">
      <p class="admin-detail-back">
        <a href="pharmacie.html" id="admin-detail-back-link" class="admin-detail-back-link">← Retour</a>
      </p>
      <article class="card admin-section admin-panel admin-detail-panel admin-pharmacy-sheet">
        <div id="pharmacyDetail" class="admin-pharmacy-detail">
          <p class="admin-loading">Chargement…</p>
        </div>
        <div id="pharmacienSection" class="admin-pharmacy-section"></div>
        <div id="stockSection" class="admin-pharmacy-section"></div>
        <div id="actionsSection" class="admin-pharmacy-section"></div>
        <p id="detailMessage" class="admin-feedback" role="status"></p>
      </article>
    </main>

    <div id="modalValider" class="modal-overlay hidden">
      <div class="modal-box admin-modal">
        <h3>Confirmer la validation</h3>
        <p>Cette pharmacie sera visible pour le public et les utilisateurs.</p>
        <div class="modal-actions">
          <button type="button" class="btn-primary" onclick="confirmValider()">Oui, valider</button>
          <button type="button" class="btn-secondary" onclick="closeModal('modalValider')">Annuler</button>
        </div>
      </div>
    </div>

    <div id="modalRefuser" class="modal-overlay hidden">
      <div class="modal-box admin-modal">
        <h3>Confirmer le refus</h3>
        <p>Le pharmacien sera notifié. Cette action est définitive.</p>
        <div class="modal-actions">
          <button type="button" class="btn-danger" onclick="confirmRefuser()">Oui, refuser</button>
          <button type="button" class="btn-secondary" onclick="closeModal('modalRefuser')">Annuler</button>
        </div>
      </div>
    </div>

    <script src="../../shared/js/api.js"></script>
    <script src="../../shared/js/weeklyPharmacyHours.js?v=3"></script>
    <script src="../../shared/js/common.js"></script>
    <script src="../../shared/js/userAuth.js"></script>
    <script src="../../shared/js/notifications.js"></script>
    <script src="../js/adminDetailShared.js?v=3"></script>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="../js/pharmacieDetail.js?v=10"></script>
  </body>
</html>
