<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Résultats recherche — Admin MediCare+</title>
    <link rel="stylesheet" href="../../shared/css/base.css" />
<link rel="stylesheet" href="../css/style.css" />
  </head>
  <body class="admin-page">
    <header class="dashboard-header admin-header">
      <div class="logo">🔍 Résultats recherche</div>
      <nav class="header-actions">
        <a href="Dashboard.html" class="header-btn header-btn-outline">← Tableau de bord</a>
        <a href="pharmacie.html" class="header-btn header-btn-outline">Pharmacies</a>
        <button type="button" class="header-btn header-btn-logout" id="btn-logout">
          <span aria-hidden="true">⎋</span> Déconnexion
        </button>
      </nav>
    </header>

    <main class="admin-main">
      <section class="card admin-panel admin-search-section">
        <h2 class="admin-panel-title">Modifier la recherche</h2>
        <form id="adminSearchForm" class="admin-search-form">
          <label>
            Nom du pharmacien
            <input type="text" name="pharmacien" id="searchPharmacien" autocomplete="off" />
          </label>
          <label>
            Nom de la pharmacie
            <input type="text" name="pharmacie" id="searchPharmacie" autocomplete="off" />
          </label>
          <label>
            Ville
            <input type="text" name="ville" id="searchVille" autocomplete="off" />
          </label>
          <button type="submit" class="btn-primary admin-search-submit">Rechercher</button>
        </form>
      </section>

      <section class="card admin-panel">
        <h2 class="admin-panel-title">Résultats</h2>
        <p id="searchSummary" class="admin-count"></p>
        <div id="searchResults" class="admin-list">
          <p class="admin-loading">Chargement…</p>
        </div>
        <p id="searchMessage" class="admin-feedback"></p>
      </section>
    </main>
<script src="../../shared/js/api.js"></script>
    <script src="../../shared/js/common.js"></script>
    <script src="../../shared/js/userAuth.js"></script>
    <script src="../js/adminListShared.js"></script>
    <script src="../js/recherchePharmacie.js"></script>
  </body>
</html>
