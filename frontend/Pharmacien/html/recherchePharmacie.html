<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recherche — Pharmacien</title>
    <link rel="stylesheet" href="../../shared/css/base.css" />
<link rel="stylesheet" href="../../shared/css/notifications.css" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="inner">
        <a href="Dashboard.html" class="logo">MediCare+ Pro</a>
        <div class="header-actions pharma-header-actions">
          <span id="pharma-name"></span>
          <div id="notif-center-mount" class="notif-center-mount"></div>
          <a href="pharmacie.html" class="btn btn-outline">Pharmacies</a>
          <a href="ajouterPharmacie.html" class="btn btn-outline">+ Pharmacie</a>
          <button type="button" id="btn-logout" class="btn btn-primary">Déconnexion</button>
        </div>
      </div>
    </header>

    <main class="container">
      <h1>Gestion pharmacies & médicaments</h1>
      <form id="search-form" class="dashboard-search" style="margin: 1rem 0">
        <input type="search" id="search-q" placeholder="Pharmacie, quartier, ville…" />
        <button type="submit" class="btn btn-teal">Rechercher</button>
      </form>

      <section class="card">
        <h2>Pharmacies</h2>
        <div id="pharmacies-results" class="pharmacy-list">
          <p class="muted">Chargement…</p>
        </div>
      </section>

      <section class="card" style="margin-top: 1.5rem">
        <h2>Médicaments (catalogue)</h2>
        <form id="med-search-form" class="dashboard-search">
          <input type="search" id="med-search-q" placeholder="Nom du médicament…" minlength="2" />
          <button type="submit" class="btn btn-outline">Chercher</button>
        </form>
        <p class="muted">Sélectionnez une pharmacie ci-dessus pour gérer le stock, ou utilisez le détail.</p>
        <div id="med-results" style="margin-top: 1rem"></div>
      </section>
    </main>

    <div id="modal-edit-pharmacy" class="pharma-modal hidden">
      <div class="pharma-modal-panel wide">
        <header>
          <h2>Modifier la pharmacie</h2>
          <button type="button" class="btn btn-small btn-outline" data-close-modal="modal-edit-pharmacy">✕</button>
        </header>
        <form id="form-edit-pharmacy"></form>
      </div>
    </div>

    <div id="modal-delete-pharmacy" class="pharma-modal hidden">
      <div class="pharma-modal-panel">
        <header>
          <h2>Supprimer la pharmacie</h2>
          <button type="button" class="btn btn-small btn-outline" data-close-modal="modal-delete-pharmacy">✕</button>
        </header>
        <p id="delete-pharmacy-text">Confirmer la suppression ?</p>
        <div class="pharma-modal-footer">
          <button type="button" class="btn btn-outline" data-close-modal="modal-delete-pharmacy">Annuler</button>
          <button type="button" id="confirm-delete-pharmacy" class="btn btn-primary" style="background: #dc2626">Supprimer</button>
        </div>
      </div>
    </div>

    <div id="modal-edit-stock" class="pharma-modal hidden">
      <div class="pharma-modal-panel">
        <header>
          <h2>Modifier le stock</h2>
          <button type="button" class="btn btn-small btn-outline" data-close-modal="modal-edit-stock">✕</button>
        </header>
        <form id="form-edit-stock"></form>
      </div>
    </div>
<script src="../../shared/js/api.js"></script>
    <script src="../../shared/js/common.js"></script>
    <script src="../../shared/js/pharmaAuth.js"></script>
    <script src="../../shared/js/notifications.js"></script>
    <script src="../js/recherchePharmacie.js"></script>
  </body>
</html>
