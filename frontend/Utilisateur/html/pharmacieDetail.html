<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Détail pharmacie — MediCare+</title>
    <link rel="stylesheet" href="../../shared/css/base.css" />
    <link rel="stylesheet" href="../../shared/css/notifications.css" />
    <link rel="stylesheet" href="../css/style.css?v=26" />
  </head>
  <body class="pharmacy-detail-page">
    <header class="site-header"></header>

    <main class="pharmacy-detail-main">
      <article class="pharmacy-detail-sheet card" id="pharmacy-detail-unified">
        <div id="pharmacy-detail" class="pharmacy-detail-sheet__hero">
          <p class="muted pharmacy-detail-loading">Chargement…</p>
        </div>

        <section class="pharmacy-detail-sheet__search" id="pharmacy-detail-search-anchor" aria-labelledby="sheet-search-title">
          <h2 class="pharmacy-detail-sheet__search-title" id="sheet-search-title">
            <span aria-hidden="true">💊</span> Ce médicament est-il disponible ici ?
          </h2>
          <form id="pharmacy-stock-search-form" class="pharmacy-detail-med-search-form pharmacy-detail-med-search-form--sheet" role="search">
            <div class="pharmacy-detail-search-compose">
              <div class="pharmacy-detail-search-input-wrap">
                <span class="pharmacy-detail-search-input-icon" aria-hidden="true">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="7" />
                    <path d="M20 20L16.5 16.5" />
                  </svg>
                </span>
                <input
                  type="search"
                  id="pharmacy-med-q"
                  name="q"
                  class="pharmacy-detail-search-input"
                  placeholder="Nom du médicament…"
                  minlength="2"
                  autocomplete="off"
                  enterkeyhint="search"
                  aria-describedby="stock-search-hint"
                  list="pharmacy-med-suggestions"
                />
                <button type="button" class="pharmacy-detail-search-clear" id="btn-pharmacy-med-clear" hidden aria-label="Effacer">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" aria-hidden="true">
                    <path d="M18 6L6 18M6 6l12 12" />
                  </svg>
                </button>
                <datalist id="pharmacy-med-suggestions"></datalist>
              </div>
              <button type="submit" class="btn btn-teal pharmacy-detail-search-submit">Vérifier</button>
            </div>
            <p class="pharmacy-detail-search-hint muted" id="stock-search-hint" role="status">2 lettres minimum</p>
          </form>
        </section>

        <section class="pharmacy-detail-sheet__results pharmacy-detail-stock-section" id="pharmacy-stock-results" aria-labelledby="stock-title">
          <header class="pharmacy-detail-sheet__results-head">
            <h2 id="stock-title">Résultats</h2>
            <span class="pharmacy-detail-stock-count" id="stock-count" hidden></span>
            <p class="muted" id="stock-summary">Les correspondances s'affichent ici.</p>
          </header>
          <div class="pharmacy-detail-stock-toolbar" id="stock-toolbar" hidden>
            <button type="button" class="btn btn-outline btn-small" id="btn-stock-show-all" aria-pressed="false">
              Tout le stock
            </button>
            <a href="rechercheMedicament.html" class="pharmacy-detail-global-search-link" id="link-med-global-search">
              Toutes les pharmacies
            </a>
          </div>
          <div id="stock-list" class="pharmacy-detail-stock-grid" aria-live="polite"></div>
        </section>
      </article>

      <section class="pharmacy-detail-panel pharmacy-detail-avis-panel" aria-labelledby="avis-title">
        <header class="pharmacy-detail-panel__head">
          <p class="pharmacy-detail-panel__kicker">Communauté</p>
          <h2 id="avis-title">Votre avis</h2>
          <p class="muted">Partagez votre expérience avec cette pharmacie.</p>
        </header>
        <p id="rating-summary" class="rating-summary"></p>
        <form id="avis-form" class="pharmacy-detail-avis-form">
          <label>Note (1 à 5)</label>
          <div class="star-rating" id="star-rating" aria-label="Note"></div>
          <input type="hidden" id="avis-note" value="0" />
          <label>
            Commentaire (optionnel)
            <textarea id="avis-commentaire" rows="3" placeholder="Décrivez votre expérience…"></textarea>
          </label>
          <button type="submit" class="btn btn-teal">Enregistrer mon avis</button>
          <p id="avis-msg" class="muted"></p>
        </form>
        <div id="avis-list" class="pharmacy-detail-avis-list"></div>
      </section>
    </main>

    <script src="../../shared/js/api.js"></script>
    <script src="../../shared/js/medSearchFuzzy.js"></script>
    <script src="../../shared/js/common.js"></script>
    <script src="../../shared/js/notifications.js"></script>
    <script src="../../shared/js/userAuth.js"></script>
    <script src="../js/pharmacieDetail.js"></script>
  </body>
</html>
